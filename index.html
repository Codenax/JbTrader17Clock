<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JbTrader17 Clock</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
    }

    body {
      background: transparent;
      font-family: Arial, sans-serif;
      overflow: hidden;
    }

    .window {
      width: 100%;
      height: 100vh;
      background: black;
      backdrop-filter: blur(14px);
      padding: 10px;
      display: flex;
      flex-direction: column;
      border: solid 0.5px #00ffb3;
      -webkit-app-region: drag;
    }

    /* TITLE BAR */
    .titlebar {
      height: 22px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 6px;
      -webkit-app-region: drag;
    }

    .titlebar::before {
      content: "";
      position: absolute;
      z-index: -1;
      top: 13px;
      left: 0;
      width: 100%;
      height: 1rem;

      background: linear-gradient(to right,
          transparent,
          #00ffb3,
          transparent);

      box-shadow: 0 0 3px #00ffb3;
    }


    .title-text {
      font-size: 8px;
      font-weight: bold;
      color: #00ffb3;
    }

    .title-actions {
      display: flex;
      gap: 4px;
    }

    .btn {
      width: 12px;
      height: 12px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      -webkit-app-region: no-drag;
    }

    .close {
      background: #ff3b3b;
    }

    .min {
      background: #ffb300;
    }

    .full {
      background: #2bd576;
    }

    .clock-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .time-display {
      text-align: center;
      font-size: 17px;
      color: #00ffb3;
      font-weight: bold;

    }

    #sessionStatus {
      text-align: center;
      font-size: 9px;
      margin-bottom: 6px;
      font-weight: bold;
      color: #888;
    }

    /* RULERS */
    .ruler-wrap {
      margin-bottom: 6px;
    }

    .ruler-title {
      font-size: 10px;
      color: #00ffb3;
      margin-bottom: 3px;
      font-weight: bold;
    }

    .ruler {
      position: relative;
      height: 30px;
    }

    /* ✅ ONLY BORDER TOP EFFECT */
    .ruler::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 0.05rem;

      background: linear-gradient(to right,
          transparent,
          #00ffb3,
          transparent);

      box-shadow: 0 0 3px #00ffb3;
    }



    .tick {
      position: absolute;
      bottom: 0;
      width: 1px;
    }

    .label {
      position: absolute;
      font-size: 9px;
      transform: translateX(-50%);
      bottom: 14px;
      color: #ccc;
      font-weight: bold;
    }

    /* SESSION LABELS */
    .label-top {
      position: absolute;
      font-size: 9px;
      transform: translateX(-50%);
      bottom: 16px;
      color: #aaa;
      font-weight: bold;
    }

    .label-bottom {
      position: absolute;
      font-size: 9px;
      transform: translateX(-50%);
      bottom: -13px;
      /* FIXED LOWER */
      font-weight: bold;
    }

    /* POINTERS */
    .pointer {
      position: absolute;
      top: 16px;
      width: 2px;
      height: 50%;
      z-index: +1;

    }

    .pointer.hour {
      background: yellow;
    }

    .pointer.minute {
      background: yellow;
    }

    .pointer.second {
      background: yellow;
      z-index: +1;

    }
  </style>
</head>

<body>

  <div class="window">

    <div class="titlebar">
      <div class="title-text">JbTrader17 Clock</div>

      <div class="title-actions">
        <button class="btn min" onclick="minimize()"></button>
        <button class="btn full" onclick="toggleFull()"></button>
        <button class="btn close" onclick="closeApp()"></button>
      </div>
    </div>

    <div class="clock-container">

      <div class="time-display" id="digitalTime">00:00:00</div>
      <div id="sessionStatus" style="font-size: 10px;">Loading session...</div>

      <!-- FUNDING -->
      <div class="ruler-wrap">
        <div class="ruler-title" style="color:#00c3ff;">Funding Fee (8H)</div>
        <div class="ruler" id="fundingRuler">
          <div class="pointer" id="fundingPointer" style="background:yellow;"></div>
        </div>
      </div>
      <!-- HOURS -->
      <div class="ruler-wrap">
        <div class="ruler-title">Hours (24H) Candle Interval</div>
        <div class="ruler" id="hourRuler">
          <div class="pointer hour" id="hourPointer"></div>
        </div>
      </div>

      <!-- MINUTES -->
      <div class="ruler-wrap">
        <div class="ruler-title">Minutes</div>
        <div class="ruler" id="minuteRuler">
          <div class="pointer minute" id="minutePointer"></div>
        </div>
      </div>

      <!-- SECONDS -->
      <div class="ruler-wrap">
        <div class="ruler-title">Seconds</div>
        <div class="ruler" id="secondRuler">
          <div class="pointer second" id="secondPointer"></div>
        </div>
      </div>

      <!-- SESSION -->
      <div class="ruler-wrap">
        <div class="ruler-title" style="color: rgb(241, 119, 205);">New York + London Session</div>
        <div class="ruler" id="sessionRuler">
          <div class="pointer" id="sessionPointer" style="background:yellow;z-index: +1;"></div>
        </div>
      </div>

    </div>
  </div>

  <script>

    /* WINDOW */
    function closeApp() { window.close(); }

    function minimize() {
      const { ipcRenderer } = require("electron");
      ipcRenderer.send("minimize-window");
    }

    function toggleFull() {
      if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen();
      } else {
        document.exitFullscreen();
      }
    }

    function createFundingRuler() {
      const r = document.getElementById("fundingRuler");

      r.innerHTML = '<div id="fundingPointer" class="pointer" style="position:absolute;width:2px;background:yellow;z-index:2;"></div>';

      for (let h = 0; h <= 8; h++) {
        const pos = (h / 8) * 100;

        const tick = document.createElement("div");
        tick.className = "tick";

        let color = "#555", height = 8;

        if (h === 0 || h === 4 || h === 8) {
          color = "red";
          height = 12;
        } else if (h % 2 === 0) {
          color = "#888";
          height = 12;
        }

        tick.style.cssText = `height:${height}px;background:${color};left:${pos}%`;
        r.appendChild(tick);

        const label = document.createElement("div");
        label.className = "label";
        label.style.left = pos + "%";
        label.innerText = h;
        r.appendChild(label);
      }
    }

    function updateFundingPointer() {
      const now = new Date();

      const hours = now.getUTCHours();
      const minutes = now.getUTCMinutes();
      const seconds = now.getUTCSeconds();

      const totalHours = (hours % 8) + minutes / 60 + seconds / 3600;

      const pos = (totalHours / 8) * 100;

      document.getElementById("fundingPointer").style.left = pos + "%";
    }

    createFundingRuler();
    setInterval(updateFundingPointer, 1000);
    /* BASIC RULERS (same as before) */


    function createHourRuler() {
      const r = document.getElementById("hourRuler");
      r.innerHTML = '<div class="pointer hour" id="hourPointer"></div>';

      for (let i = 0; i <= 24; i++) {

        const pos = (i / 24) * 100;

        const tick = document.createElement("div");
        tick.className = "tick";

        let color = "#555", height = 6;

        if (i % 8 === 0) {
          color = "red";
          height = 12;
        } else {
          color = "#aaa";
          height = 8;
        }

        tick.style.cssText = `height:${height}px;background:${color};left:${pos}%`;
        r.appendChild(tick);

        // 🔥 CORRECT LABEL LOGIC
        if (i % 2 === 0) {
          const label = document.createElement("div");
          label.className = "label";
          label.style.left = pos + "%";

          let labelValue;

          if (i === 24) {
            labelValue = 24; // ✅ last fix
          } else {
            labelValue = (i + 24) % 24;
          }

          label.innerText = labelValue;

          r.appendChild(label);
        }
      }
    }


    function createMinuteRuler() {
      const r = document.getElementById("minuteRuler");
      for (let m = 0; m <= 60; m++) {
        const pos = (m / 60) * 100;
        const tick = document.createElement("div");
        tick.className = "tick";

        let color = "#555", height = 6;
        if (m % 30 === 0) { color = "red"; height = 12; }
        else if (m % 15 === 0) { color = "purple"; height = 12; }
        else if (m % 5 === 0) { color = "#aaa"; height = 10; }

        tick.style.cssText = `height:${height}px;background:${color};left:${pos}%`;
        r.appendChild(tick);

        if (m % 5 === 0) {
          const label = document.createElement("div");
          label.className = "label";
          label.style.left = pos + "%";
          label.innerText = m;
          r.appendChild(label);
        }
      }
    }

    function createSecondRuler() {
      const r = document.getElementById("secondRuler");
      for (let s = 0; s <= 60; s++) {
        const pos = (s / 60) * 100;
        const tick = document.createElement("div");
        tick.className = "tick";

        let color = "#555", height = 6;
        if (s % 30 === 0) { color = "red"; height = 12; }
        else if (s % 15 === 0) { color = "purple"; height = 12; }
        else if (s % 5 === 0) { color = "#aaa"; height = 10; }

        tick.style.cssText = `height:${height}px;background:${color};left:${pos}%`;
        r.appendChild(tick);

        if (s % 5 === 0) {
          const label = document.createElement("div");
          label.className = "label";
          label.style.left = pos + "%";
          label.innerText = s;
          r.appendChild(label);
        }
      }
    }

    /* SESSION RULER WITH 30 MIN TICKS */
    function createSessionRuler() {
      const r = document.getElementById("sessionRuler");
      r.innerHTML = '<div class="pointer" id="sessionPointer" style="background:yellow;z-index:1;"></div>';

      for (let h = 18; h <= 24; h++) {

        // POSITION (6PM → 12AM)
        let pos = ((h - 18) / 6) * 100;

        // MAIN TICK
        const tick = document.createElement("div");
        tick.className = "tick";

        let color = "#555";
        let height = 8;

        if (h >= 19 && h <= 23) {
          color = "#00ffb3";
          height = 13;
        }

        tick.style.cssText = `height:${height}px;background:${color};left:${pos}%`;
        r.appendChild(tick);

        // 30 MIN TICK
        if (h !== 24) {
          let midPos = ((h - 18 + 0.5) / 6) * 100;
          const midTick = document.createElement("div");
          midTick.className = "tick";
          midTick.style.cssText = `height:6px;background:#777;left:${midPos}%`;
          r.appendChild(midTick);
        }

        // TOP LABEL (FIXED 12AM HANDLING)
        const top = document.createElement("div");
        top.className = "label-top";
        top.style.left = pos + "%";

        if (h === 24) {
          top.innerText = "12AM";   // ✅ FIXED
        } else {
          let displayHour = h - 12; // 18→6PM, 19→7PM ...
          top.innerText = displayHour + "PM";
        }

        r.appendChild(top);

        // BOTTOM LABEL
        const bottom = document.createElement("div");
        bottom.className = "label-bottom";
        bottom.style.left = pos + "%";

        if (h === 19) {
          bottom.innerText = "N Start";
          bottom.style.color = "#00ffb3";
        }
        else if (h === 23) {
          bottom.innerText = "L End";
          bottom.style.color = "#ff3b3b";
        }
        else if (h > 19 && h < 23) {
          bottom.innerText = "N+L";
          bottom.style.color = "#aaa";
        }

        r.appendChild(bottom);
      }
    }
    /* =========================
       SESSION TIME FORMATTER
    ========================= */

    function formatCountdown(now, target) {
      let diff = target - now;
      if (diff < 0) diff += 24;

      const totalSec = Math.floor(diff * 3600);

      const hh = Math.floor(totalSec / 3600);
      const mm = Math.floor((totalSec % 3600) / 60);
      const ss = totalSec % 60;

      return `${hh}:${String(mm).padStart(2, "0")}:${String(ss).padStart(2, "0")}`;
    }

    /* =========================
       SESSION FLOW DATA
    ========================= */

    const displays = [
      { l1: "Sydney End", t1: 13, l2: "Sydney + Tokyo Start", t2: 6 },

      { l1: "Sydney + Tokyo End", t1: 13, l2: "Tokyo + London Start", t2: 14 },

      { l1: "Tokyo + London End", t1: 15, l2: "London + New York Start", t2: 19 },

      { l1: "London + New York End", t1: 23, l2: "New York End,Sydney Start", t2: 4 }
    ];

    /* =========================
       GET ACTIVE DISPLAY
    ========================= */

    function getIndex(t) {
      // use ONLY t2 for switching
      if (t < 6) return 0;      // before Sydney+Tokyo start
      if (t < 14) return 1;     // after first switch
      if (t < 19) return 2;
      if (t < 23) return 3;
      return 3; // রাতের জন্য last display
    }

    /* =========================
       COLOR RULES
    ========================= */

    function getColor(text) {
      if (text.includes("Start")) return "#00ff00";   // green
      if (text.includes("End")) return "#ffd400";  // yello

      return "#ffd400"; // default
    }

    /* 🔥 overlap mark */
    function addFire(text) {
      return text.includes("+") ? text + " 🔥" : text;
    }


    /* CLOCK */
    function updateClockSmooth() {
      const now = new Date();

      const ms = now.getMilliseconds();
      const h = now.getHours();
      const m = now.getMinutes();
      const s = now.getSeconds() + ms / 1000;

      const h12 = h % 12 || 12;
      const ampm = h >= 12 ? "PM" : "AM";

      digitalTime.innerText =
        `${String(h12).padStart(2, '0')}:${String(m).padStart(2, '0')}:${String(Math.floor(s)).padStart(2, '0')} ${ampm}`;


      // 6AM base shift
      let base = 6;
      let hourNow = h + m / 60 + s / 3600;
      let dif = hourNow - base;
      if (dif < 0) dif += 24;

      hourPointer.style.left = (dif / 24 * 100) + "%";


      minutePointer.style.left = ((m + s / 60) / 60 * 100) + "%";
      secondPointer.style.left = (s / 60 * 100) + "%";

      let sessionHour = h + m / 60 + s / 3600;

      if (sessionHour >= 18 && sessionHour <= 24) {
        sessionPointer.style.left = ((sessionHour - 18) / 6 * 100) + "%";
      } else {
        sessionPointer.style.left = "-10%";
      }


      /* SESSION DETECTION */




      /* SESSION DETECTION (ONLY CURRENT + NEXT 2 LINE SYSTEM) */

      const t = h + m / 60 + s / 3600;

      const d = displays[getIndex(t)];

      /* detect if line1 finished */
      function isTimeUp(now, target) {
        let diff = target - now;
        if (diff < 0) diff += 24;
        return diff < (1 / 3600); // less than 1 second
      }

      let line1, line1Color;

      if (isTimeUp(t, d.t1)) {
        line1 = "Next Loading...";
        line1Color = "#ccc"; // light white
      } else {
        line1 = `${d.l1} (${formatCountdown(t, d.t1)})`;
        line1Color = getColor(line1);
      }

      let line2 = `${d.l2} (${formatCountdown(t, d.t2)})`;

      const el = document.getElementById("sessionStatus");

      el.innerHTML =
        `<span style="color:${line1Color}">${addFire(line1)}</span><br>` +
        `<span style="color:${getColor(line2)}">${addFire(line2)}</span>`;




      requestAnimationFrame(updateClockSmooth);
    }



    /* INIT */
    createFundingRuler();
    createHourRuler();
    createMinuteRuler();
    createSecondRuler();
    createSessionRuler();
    updateClockSmooth();


  </script>

</body>

</html>
