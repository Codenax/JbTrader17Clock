<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JbTrader17 Clock</title>
  <link rel="stylesheet" href="style.css">
  <style>

  </style>
</head>

<body>

  <div class="window">

    <div class="titlebar">

      <!-- LEFT MENU BUTTON -->
      <div class="menu-btn" onclick="toggleMenu()">
        ☰
      </div>

      <!-- APP TITLE -->
      <div class="title">JbTrader17 Clock</div>

      <!-- WINDOW CONTROLS -->
      <div class="title-actions">
        <button class="btn min" onclick="minimize()"></button>
        <button class="btn full" onclick="toggleFull()"></button>
        <button class="btn close" onclick="closeApp()"></button>
      </div>

    </div>

    <!-- SIDE MENU -->
    <div id="sideMenu" class="side-menu">
      <div class="menu-item">Dashboard</div>
      <div class="menu-item">Sessions</div>
      <div class="menu-item">Settings</div>
      <div class="menu-item">About</div>
    </div>
    <!-- SIDE MENU -->
    <div id="sideMenu" class="side-menu">
      <div class="menu-item">Dashboard</div>
      <div class="menu-item">Sessions</div>
      <div class="menu-item">Settings</div>
      <div class="menu-item">About</div>
    </div>

    <div class="clock-container">

      <div class="time-display" id="digitalTime" style="margin-top:3px;">00:00:00</div>
      <div id="sessionStatus" style="font-size: 10px; ">Loading session...</div>

      <!-- FUNDING -->
      <div class="ruler-wrap">
        <div class="ruler-title" style="color:#00c3ff;">Funding Fee (8H)</div>
        <div class="ruler" id="fundingRuler">
          <div class="pointer" id="fundingPointer" style="background:yellow;"></div>
        </div>
      </div>
      <!-- HOURS -->
      <div class="ruler-wrap">
        <div class="ruler-title">Hours (24H) Candle Interval</div>
        <div class="ruler" id="hourRuler">
          <div class="pointer hour" id="hourPointer"></div>
        </div>
      </div>

      <!-- MINUTES -->
      <div class="ruler-wrap">
        <div class="ruler-title">Minutes</div>
        <div class="ruler" id="minuteRuler">
          <div class="pointer minute" id="minutePointer"></div>
        </div>
      </div>

      <!-- SECONDS -->
      <div class="ruler-wrap">
        <div class="ruler-title">Seconds</div>
        <div class="ruler" id="secondRuler">
          <div class="pointer second" id="secondPointer"></div>
        </div>
      </div>

      <!-- SESSION -->
      <div class="ruler-wrap">
        <div class="ruler-title" style="color: rgb(241, 119, 205);">New York + London Session</div>
        <div class="ruler" id="sessionRuler">
          <div class="pointer" id="sessionPointer" style="background:yellow;z-index: +1;"></div>
        </div>
      </div>
      <!-- 24H SESSION MULTI LINE -->
      <div class="ruler-wrap" style="margin-top:10px">
        <div class="ruler-title" style="color:rgb(229, 255, 0);">24H Market Sessions</div>
        <div class="multi-ruler ruler forexRuler" id="forexRuler">
          <div class="pointer" id="multiPointer" style="background:yellow;"></div>
        </div>
      </div>
      <div class="ruler-wrap" style="margin-top: 15px">
        <div class="ruler-title jbname">&copy; Jahangir Alam</div>
        <div class="multi-ruler ruler" style="height: 0px;">

        </div>
      </div>

    </div>
  </div>


  <script src="forexSessionRuler.js"></script>
  <script>
    createForexSessionRuler("forexRuler");
  </script>
  <script src="sessionRuler.js"></script>
  <script src="app.js"></script>

</body>

</html>
